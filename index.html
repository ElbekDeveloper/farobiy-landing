<style>/* ============================================
   FAROBIY INTERNATIONAL SCHOOL — DESIGN TOKENS
   Brandbook: navy + emerald, with Bukhara warm accents
   ============================================ */
:root {
  /* Primary brand */
  --navy-900: #0A1A30;
  --navy-800: #0E2342;
  --navy-700: #163055;
  --navy-600: #1F4173;
  --navy-500: #355B91;
  --navy-300: #8AA0BF;
  --navy-100: #E2E8F1;

  --emerald-700: #0B7A3E;
  --emerald-600: #0FA855;
  --emerald-500: #25C46B;
  --emerald-400: #5BD891;
  --emerald-100: #DCF5E5;

  /* Warm secondary — Bukhara saffron */
  --saffron-700: #B8732B;
  --saffron-600: #D9923D;
  --saffron-500: #E5A85A;
  --saffron-100: #F8E8CC;

  /* Neutral / surfaces */
  --ink: var(--navy-900);
  --ink-soft: #2B3A52;
  --muted: #5C6B82;
  --cream: #F7F3EA;
  --cream-2: #EFE8D7;
  --paper: #FBFAF6;
  --line: #E3DECF;
  --line-soft: #EEEAE0;
  --white: #FFFFFF;

  /* Tokens */
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --radius-xl: 32px;
  --radius-pill: 999px;

  --shadow-sm: 0 1px 2px rgba(14, 35, 66, 0.06), 0 2px 6px rgba(14, 35, 66, 0.04);
  --shadow-md: 0 4px 14px rgba(14, 35, 66, 0.07), 0 12px 32px rgba(14, 35, 66, 0.06);
  --shadow-lg: 0 12px 30px rgba(14, 35, 66, 0.10), 0 30px 60px rgba(14, 35, 66, 0.08);
  --shadow-card: 0 1px 0 rgba(14, 35, 66, 0.04), 0 8px 28px -8px rgba(14, 35, 66, 0.18);

  --font-display: "Instrument Serif", "Times New Roman", serif;
  --font-sans: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;

  /* Container */
  --container: 1240px;
  --gutter: clamp(20px, 4vw, 48px);

  /* Active accent (driven by tweaks) */
  --accent: var(--emerald-600);
  --accent-soft: var(--emerald-100);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  color: var(--ink);
  background: var(--paper);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

::selection { background: var(--navy-800); color: var(--cream); }

/* ============ TYPOGRAPHY ============ */
.display {
  font-family: var(--font-display);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.02;
  color: var(--navy-800);
}
.display em {
  font-style: italic;
  color: var(--emerald-600);
}

.eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--emerald-700);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "";
  width: 24px;
  height: 1.5px;
  background: var(--emerald-600);
  display: block;
}
.eyebrow.no-bar::before { display: none; }

h1, h2, h3, h4 { margin: 0; }
p { margin: 0; }

/* ============ LAYOUT ============ */
.container {
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 var(--gutter);
}
.section {
  padding: clamp(72px, 9vw, 130px) 0;
  position: relative;
}
.section-tight { padding: clamp(48px, 6vw, 80px) 0; }

/* ============ BUTTONS ============ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  border-radius: var(--radius-pill);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.01em;
  transition: all 200ms cubic-bezier(.2,.8,.2,1);
  white-space: nowrap;
  border: 1.5px solid transparent;
}
.btn-primary {
  background: var(--navy-800);
  color: var(--cream);
}
.btn-primary:hover {
  background: var(--navy-700);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.btn-accent {
  background: var(--emerald-600);
  color: var(--white);
}
.btn-accent:hover {
  background: var(--emerald-700);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(15, 168, 85, 0.30);
}
.btn-ghost {
  background: transparent;
  color: var(--navy-800);
  border-color: var(--navy-800);
}
.btn-ghost:hover {
  background: var(--navy-800);
  color: var(--cream);
}
.btn-link {
  color: var(--navy-800);
  padding: 0;
  border-radius: 0;
  font-weight: 600;
  font-size: 15px;
}
.btn-link::after {
  content: "→";
  margin-left: 6px;
  transition: transform 200ms;
}
.btn-link:hover::after { transform: translateX(4px); }

/* ============ CHEVRON / MOTIFS ============ */
/* The Farobiy logo chevron — used as a recurring graphic */
.chev {
  display: inline-block;
  width: 14px;
  height: 18px;
  background:
    linear-gradient(135deg, transparent 50%, var(--emerald-600) 50%) bottom left / 100% 50% no-repeat,
    linear-gradient(45deg, var(--navy-800) 50%, transparent 50%) top left / 100% 50% no-repeat;
}

/* Bukhara-tile inspired faint backgrounds */
.tile-pattern {
  background-image:
    radial-gradient(circle at 50% 50%, rgba(15, 168, 85, 0.07) 0 1.5px, transparent 2px),
    radial-gradient(circle at 0 0, rgba(14, 35, 66, 0.05) 0 1.5px, transparent 2px),
    radial-gradient(circle at 100% 100%, rgba(14, 35, 66, 0.05) 0 1.5px, transparent 2px);
  background-size: 36px 36px;
}

/* ============ PILLS / TAGS ============ */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px 6px 12px;
  background: var(--cream);
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 500;
  color: var(--navy-700);
}
.pill .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--emerald-600);
}

/* ============ CARDS ============ */
.card {
  background: var(--white);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  transition: all 250ms cubic-bezier(.2,.8,.2,1);
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

/* ============ ANIMATIONS ============ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slowSpin {
  to { transform: rotate(360deg); }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 700ms cubic-bezier(.2,.8,.2,1), transform 700ms cubic-bezier(.2,.8,.2,1);
}
.reveal.in {
  opacity: 1;
  transform: translateY(0);
}

/* ============ PLACEHOLDER (for missing photos) ============ */
.ph {
  position: relative;
  background: var(--navy-100);
  background-image:
    repeating-linear-gradient(135deg, transparent 0 14px, rgba(14, 35, 66, 0.04) 14px 15px);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--navy-700);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-radius: inherit;
  overflow: hidden;
}
.ph::before {
  content: "";
  position: absolute;
  inset: 12px;
  border: 1px dashed rgba(14, 35, 66, 0.2);
  border-radius: calc(inherit - 12px);
  pointer-events: none;
}

/* Gradient warm placeholder used for "campus" shots */
.ph-warm {
  background:
    radial-gradient(circle at 30% 20%, rgba(229, 168, 90, 0.4), transparent 50%),
    radial-gradient(circle at 70% 80%, rgba(15, 168, 85, 0.3), transparent 50%),
    linear-gradient(135deg, #C7B998 0%, #A99A78 100%);
}
.ph-cool {
  background:
    radial-gradient(circle at 20% 30%, rgba(91, 216, 145, 0.4), transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(53, 91, 145, 0.5), transparent 50%),
    linear-gradient(135deg, #2E4B73 0%, #0E2342 100%);
}

/* ============ NAV ============ */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  transition: all 250ms;
  padding: 18px 0;
}
.nav.scrolled {
  background: rgba(251, 250, 246, 0.85);
  backdrop-filter: saturate(150%) blur(14px);
  -webkit-backdrop-filter: saturate(150%) blur(14px);
  padding: 12px 0;
  border-bottom: 1px solid var(--line-soft);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
}
.nav-logo img {
  height: 46px;
  width: auto;
  display: block;
}
.nav-links {
  display: flex;
  gap: 4px;
  align-items: center;
}
.nav-link {
  padding: 10px 14px;
  font-size: 14.5px;
  font-weight: 500;
  color: var(--ink-soft);
  border-radius: var(--radius-pill);
  transition: all 180ms;
}
.nav-link:hover {
  color: var(--navy-800);
  background: var(--cream);
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 14px;
}
.lang-switch {
  display: flex;
  align-items: center;
  background: var(--cream);
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  padding: 3px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
}
.lang-switch button {
  padding: 6px 10px;
  border-radius: var(--radius-pill);
  color: var(--muted);
  letter-spacing: 0.06em;
  transition: all 180ms;
}
.lang-switch button.active {
  background: var(--navy-800);
  color: var(--cream);
}

@media (max-width: 920px) {
  .nav-links { display: none; }
}

/* ============ SECTION HEADER ============ */
.sec-header {
  max-width: 760px;
  margin-bottom: clamp(40px, 5vw, 64px);
}
.sec-header h2 {
  font-family: var(--font-display);
  font-size: clamp(40px, 5.5vw, 68px);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.02;
  color: var(--navy-800);
  margin-top: 16px;
}
.sec-header h2 em {
  font-style: italic;
  color: var(--emerald-600);
}
.sec-header .lede {
  font-size: 18px;
  color: var(--muted);
  margin-top: 18px;
  max-width: 60ch;
  line-height: 1.55;
}

/* ============ FOOTER override ============ */
.footer {
  background: var(--navy-900);
  color: var(--cream);
  padding: 80px 0 32px;
  position: relative;
  overflow: hidden;
}
</style>

function useReveal() {
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal:not(.in)');
    if (!('IntersectionObserver' in window)) {
      els.forEach(e => e.classList.add('in'));
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting) {
          en.target.classList.add('in');
          io.unobserve(en.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -80px 0px' });
    els.forEach(e => io.observe(e));
    return () => io.disconnect();
  });
}

/* The Farobiy chevron mark — rebuilt as inline SVG */
function ChevMark({ size = 32, className = '' }) {
  return (
    <svg className={className} width={size} height={size * 1.1} viewBox="0 0 32 36" fill="none">
      <path d="M5 2 L18 18 L5 34 L9 18 Z" fill="#0E2342" />
      <path d="M3 12 L11 22 L3 34 Z" fill="#0FA855" />
    </svg>
  );
}

/* Animated counter */
function Counter({ to, suffix = '', prefix = '', duration = 1400 }) {
  const [val, setVal] = React.useState(0);
  const ref = React.useRef(null);
  const [started, setStarted] = React.useState(false);

  React.useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting && !started) {
          setStarted(true);
        }
      });
    }, { threshold: 0.4 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, [started]);

  React.useEffect(() => {
    if (!started) return;
    const start = performance.now();
    let raf;
    const tick = (t) => {
      const p = Math.min(1, (t - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(to * eased));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [started, to, duration]);

  return <span ref={ref}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

}

    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

/* ============ DAY TIMELINE ============ */

function DayTimeline({ lang }) {
  const c = window.CONTENT[lang].day;
  const { SectionHeader, ICONS } = window;
  const [hover, setHover] = React.useState(null);

  return (
    <section id="day" className="section day-section">
      <div className="container">
        <SectionHeader
          eyebrow={c.eyebrow}
          titleParts={[
            { text: c.title_a },
            { text: c.title_b, em: true },
            { text: c.title_c },
          ]}
          lede={c.lede}
        />

        <div className="day-grid reveal">
          {/* Left timeline */}
          <div className="day-timeline">
            {c.schedule.map((s, i) => (
              <div
                key={i}
                className={`day-step ${hover === i ? 'on' : ''}`}
                onMouseEnter={() => setHover(i)}
                onMouseLeave={() => setHover(null)}
              >
                <div className="day-step-time">
                  <span className="day-step-time-num">{s.time}</span>
                </div>
                <div className="day-step-dot">
                  <span />
                </div>
                <div className="day-step-body">
                  <div className="day-step-icon">{ICONS[s.icon] || ICONS.book}</div>
                  <div className="day-step-text">
                    <div className="day-step-label">{s.label}</div>
                    <div className="day-step-note">{s.note}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* Right — clock visualisation */}
          <div className="day-visual">
            <div className="day-clock">
              <svg viewBox="0 0 400 400" width="100%" height="100%">
                <defs>
                  <linearGradient id="dayGrad" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stopColor="#0FA855" />
                    <stop offset="100%" stopColor="#0E2342" />
                  </linearGradient>
                </defs>
                {/* Background ring */}
                <circle cx="200" cy="200" r="160" fill="none" stroke="#E3DECF" strokeWidth="1.5" />
                <circle cx="200" cy="200" r="120" fill="none" stroke="#E3DECF" strokeWidth="1" strokeDasharray="2 4" />

                {/* Active arc */}
                {hover !== null && (() => {
                  const totalSteps = c.schedule.length;
                  const step = hover;
                  const startAngle = -90 + (step / totalSteps) * 360;
                  const endAngle = -90 + ((step + 1) / totalSteps) * 360;
                  const r = 160;
                  const cx = 200, cy = 200;
                  const s = (a) => [cx + r * Math.cos(a * Math.PI / 180), cy + r * Math.sin(a * Math.PI / 180)];
                  const [x1, y1] = s(startAngle);
                  const [x2, y2] = s(endAngle);
                  const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
                  return <path d={`M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`} stroke="url(#dayGrad)" strokeWidth="4" fill="none" strokeLinecap="round" />;
                })()}

                {/* Time markers */}
                {c.schedule.map((s, i) => {
                  const angle = -90 + (i / c.schedule.length) * 360;
                  const rad = angle * Math.PI / 180;
                  const x = 200 + 160 * Math.cos(rad);
                  const y = 200 + 160 * Math.sin(rad);
                  const isOn = hover === i;
                  return (
                    <g key={i} style={{ cursor: 'pointer', transition: 'all 220ms' }}
                      onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}>
                      <circle cx={x} cy={y} r={isOn ? 10 : 5}
                        fill={isOn ? '#0FA855' : '#FFFFFF'}
                        stroke={isOn ? '#0E2342' : '#0FA855'} strokeWidth="2" />
                    </g>
                  );
                })}

                {/* Center label */}
                <g transform="translate(200 200)" textAnchor="middle">
                  <text y="-12" fontFamily="JetBrains Mono" fontSize="10" letterSpacing="2" fill="#5C6B82">CHAS</text>
                  <text y="18" fontFamily="Instrument Serif" fontSize="44" fill="#0E2342">
                    {hover !== null ? c.schedule[hover].time : '08:00'}
                  </text>
                  <text y="42" fontFamily="Manrope" fontSize="13" fontWeight="500" fill="#0FA855">
                    {hover !== null ? c.schedule[hover].label : 'Maktab boshlanadi'}
                  </text>
                </g>
              </svg>
            </div>
            <p className="day-hint">Vaqtga sichqonchani olib boring</p>
          </div>
        </div>
      </div>

      <style>{`
        .day-section {
          background: var(--cream);
          position: relative;
          overflow: hidden;
        }
        .day-grid {
          display: grid;

        }
        .day-timeline { display: flex; flex-direction: column; }
        .day-step {

          transition: all 220ms;
          cursor: default;
        }
        .day-step:hover, .day-step.on { background: var(--paper); border-radius: var(--radius-md); }
        .day-step-time {
          font-family: var(--font-mono);
          font-size: 13px;
          font-weight: 500;
          color: var(--muted);
          letter-spacing: 0.04em;
          padding: 4px 16px 0 8px;
          text-align: right;
        }
        .day-step.on .day-step-time { color: var(--emerald-700); font-weight: 600; }
        .day-step-dot {
          position: relative;
          display: flex;
          justify-content: center;
        }
        .day-step-dot::before {
          content: "";
          position: absolute;
          top: 0; bottom: 0;
          left: 50%;
          width: 1.5px;
          background: var(--line);
          transform: translateX(-50%);
        }
        .day-step:first-child .day-step-dot::before { top: 50%; }

        .day-step-dot span {
          position: relative;

          transition: all 220ms;
        }
        .day-step.on .day-step-dot span {
          background: var(--emerald-600);
          border-color: var(--navy-800);
          transform: scale(1.4);
        }
        .day-step-body {
          display: flex;

          .day-grid { grid-template-columns: 1fr; }

          color: rgba(247, 243, 234, 0.75);
          max-width: 32ch;
        }

        .footer-cols {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 40px;
        }
        .footer-col { display: flex; flex-direction: column; gap: 14px; }
        .footer-col-title {
          font-family: var(--font-mono);
          font-size: 11px;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          color: var(--emerald-400);
          font-weight: 500;
          margin-bottom: 4px;
        }
        .footer-link {
          font-size: 14.5px;
          color: rgba(247, 243, 234, 0.75);
          transition: color 180ms;
        }
        .footer-link:hover { color: var(--cream); }

        .footer-wordmark {
          padding: 56px 0 24px;
          font-family: var(--font-display);
          font-size: clamp(120px, 18vw, 280px);
          line-height: 0.85;
          letter-spacing: -0.04em;
          color: var(--cream);
          opacity: 0.95;
          text-align: center;
          position: relative;
        }
        .footer-wordmark-sub {
          display: block;
          font-family: var(--font-display);
          font-style: italic;
          font-size: clamp(20px, 2.4vw, 32px);
          letter-spacing: -0.01em;
          color: var(--emerald-400);
          margin-top: 8px;
        }

        .footer-bottom {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding-top: 24px;
          border-top: 1px solid rgba(247, 243, 234, 0.12);
          font-size: 12.5px;
          color: rgba(247, 243, 234, 0.55);
          font-family: var(--font-mono);
          letter-spacing: 0.02em;
          flex-wrap: wrap;
          gap: 16px;
        }
        .footer-legal { display: flex; gap: 20px; }
        .footer-legal a { color: inherit; transition: color 180ms; }
        .footer-legal a:hover { color: var(--cream); }

        @media (max-width: 900px) {
          .footer-top { grid-template-columns: 1fr; gap: 40px; }
          .footer-cols { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 540px) {
          .footer-cols { grid-template-columns: 1fr; }
          .footer-bottom { flex-direction: column; align-items: flex-start; }
        }
      `}</style>
    </footer>
  );
}

window.Footer = Footer;

</script>
<script type="text/babel" data-presets="react">
/* ============ MAIN APP ============ */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "emerald",
  "accentColor": "#0FA855",
  "headingStyle": "serif",
  "motifDensity": "normal",
  "heroVariant": "portrait",
  "dark": false
}/*EDITMODE-END*/;

const ACCENT_PALETTE = {
  emerald: { primary: "#0FA855", primary700: "#0B7A3E", primary100: "#DCF5E5", primary400: "#5BD891" },
  saffron: { primary: "#D9923D", primary700: "#B8732B", primary100: "#F8E8CC", primary400: "#E5A85A" },
  navyblue: { primary: "#355B91", primary700: "#1F4173", primary100: "#E2E8F1", primary400: "#8AA0BF" },
};

function applyTheme(t) {
  const root = document.documentElement;
  const pal = ACCENT_PALETTE[t.accent] || ACCENT_PALETTE.emerald;
  root.style.setProperty('--emerald-600', pal.primary);
  root.style.setProperty('--emerald-700', pal.primary700);
  root.style.setProperty('--emerald-100', pal.primary100);
  root.style.setProperty('--emerald-400', pal.primary400);
  root.style.setProperty('--accent', pal.primary);

  if (t.dark) {
    root.style.setProperty('--paper', '#0A1A30');
    root.style.setProperty('--white', '#152C4D');
    root.style.setProperty('--cream', '#102341');
    root.style.setProperty('--cream-2', '#162E54');
    root.style.setProperty('--line', '#22406E');
    root.style.setProperty('--line-soft', '#1B3258');
    root.style.setProperty('--ink', '#F7F3EA');
    root.style.setProperty('--ink-soft', '#D8DFEA');
    root.style.setProperty('--muted', '#8FA0BD');
    root.style.setProperty('--navy-800', '#F7F3EA');
    root.style.setProperty('--navy-700', '#D8DFEA');
    root.style.setProperty('--navy-900', '#06101F');
    root.style.setProperty('--navy-100', '#1F3457');
  } else {
    root.style.removeProperty('--paper');
    root.style.removeProperty('--white');
    root.style.removeProperty('--cream');
    root.style.removeProperty('--cream-2');
    root.style.removeProperty('--line');
    root.style.removeProperty('--line-soft');
    root.style.removeProperty('--ink');
    root.style.removeProperty('--ink-soft');
    root.style.removeProperty('--muted');
    root.style.removeProperty('--navy-800');
    root.style.removeProperty('--navy-700');
    root.style.removeProperty('--navy-900');
    root.style.removeProperty('--navy-100');
  }
}

function App() {
  const [lang, setLang] = React.useState('uz');
  const { useTweaks, TweaksPanel, TweakSection, TweakSelect, TweakColor, TweakToggle, TweakRadio } = window;
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => { applyTheme(t); }, [t.accent, t.dark]);

  // Reveal observer
  window.useReveal();

  // Show notice if non-UZ is selected (RU/EN content not yet localized)
  const effectiveLang = window.CONTENT[lang] ? lang : 'uz';

  const {
    Nav, Hero, About, WhyUs, Programs, DayTimeline,
    Campus, Faculty, Outcomes, Admissions, Testimonials, FAQ, Contact, Footer
  } = window;

  return (
    <>
      <Nav lang={effectiveLang} setLang={setLang} />
      <main>
        <Hero lang={effectiveLang} motifDensity={t.motifDensity} />
        <About lang={effectiveLang} />
        <WhyUs lang={effectiveLang} />
        <Programs lang={effectiveLang} />
        <DayTimeline lang={effectiveLang} />
        <Campus lang={effectiveLang} />
        <Outcomes lang={effectiveLang} />
        <Admissions lang={effectiveLang} />
        <Testimonials lang={effectiveLang} />
        <FAQ lang={effectiveLang} />
        <Contact lang={effectiveLang} />
      </main>
      <Footer lang={effectiveLang} />

      {lang !== 'uz' && (
        <div className="lang-notice">
          <strong>{lang.toUpperCase()}</strong> tarjima hozircha mavjud emas — O'zbek tilida ko'rsatildi.
          <button onClick={() => setLang('uz')}>OK</button>
        </div>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection title="Asosiy rang">
          <TweakRadio
            label="Aksent"
            value={t.accent}
            onChange={(v) => setTweak('accent', v)}
            options={[
              { value: 'emerald', label: 'Emerald' },
              { value: 'saffron', label: 'Saffron' },
              { value: 'navyblue', label: 'Slate' },
            ]}
          />
        </TweakSection>
        <TweakSection title="Tema">
          <TweakToggle
            label="Qorong'u rejim"
            value={t.dark}
            onChange={(v) => setTweak('dark', v)}
          />
        </TweakSection>
      </TweaksPanel>

      <style>{`
        .lang-notice {
          position: fixed;
          bottom: 24px; left: 50%;
          transform: translateX(-50%);
          background: var(--navy-800);
          color: var(--cream);
          padding: 12px 18px;
          border-radius: var(--radius-pill);
          font-size: 13px;
          z-index: 90;
          display: flex; align-items: center; gap: 12px;
          box-shadow: var(--shadow-lg);
        }
        .lang-notice button {
          padding: 4px 10px;
          background: var(--emerald-600);
          color: white;
          border-radius: var(--radius-pill);
          font-size: 12px;
          font-weight: 600;
        }
      `}</style>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
